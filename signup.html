<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Sono</title>
  <meta name="description" content="Sign up for a Sono Account to schedule and manage your hearing health care appointments.">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/dark-mode.css" rel="stylesheet" id="dark-mode-stylesheet" disabled>
  <link href="assets/css/rtl.css" rel="stylesheet" id="rtl-stylesheet" disabled>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body style="overflow-x: hidden;">
  <!-- Theme Toggle Floating Button -->
  <button class="btn btn-link icon-btn" id="theme-toggle" aria-label="Toggle dark/light theme" style="position: absolute; top: 1.5rem; right: 1.5rem; z-index: 100; margin: 0;">🌙</button>

  <div class="auth-page-wrapper">
    <div class="auth-card glass glass-form">
      <div class="text-center mb-4">
        <a href="index.html" class="logo d-block mb-3" style="font-size: 2.25rem; font-weight: 800; text-decoration: none; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Sono</a>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join us to manage your hearing health online.</p>
      </div>

      <!-- Social Logins -->
      <button class="social-auth-btn mb-3">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
        Sign up with Google
      </button>

      <div class="auth-divider">or use email</div>

      <!-- Standard Form -->
      <form action="login.html" method="GET">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" class="form-control" placeholder="John Doe" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" class="form-control" placeholder="yourname@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" class="form-control" placeholder="Min. 8 characters" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3 mt-2">Sign Up</button>
      </form>

      <p class="text-center mt-4 mb-0 text-muted" style="font-size: 0.95rem;">
        Already have an account? <a href="login.html" class="text-decoration-none" style="color: var(--primary); font-weight: 600;">Log in</a>
      </p>

      <div class="text-center mt-3">
        <a href="index.html" class="text-decoration-none" style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">← Back to home</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
