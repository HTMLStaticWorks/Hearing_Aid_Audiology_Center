<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Sono</title>
  <meta name="description" content="Sign up for a Sono Account to schedule and manage your hearing health care appointments.">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/dark-mode.css" rel="stylesheet" id="dark-mode-stylesheet" disabled>
  <link href="assets/css/rtl.css" rel="stylesheet" id="rtl-stylesheet" disabled>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body style="overflow-x: hidden;">
  <!-- Theme Toggle Floating Button -->
  <button class="btn btn-link icon-btn" id="theme-toggle" aria-label="Toggle dark/light theme" style="position: absolute; top: 1.5rem; right: 1.5rem; z-index: 100; margin: 0;">🌙</button>

  <div class="auth-page-wrapper">
    <div class="auth-card glass glass-form">
      <div class="text-center mb-4">
        <a href="index.html" class="logo d-block mb-3" style="font-size: 1.5rem; justify-content: center;">
          <img src="assets/images/new_logo.png" alt="Sono Logo" class="logo-icon">
          Sono
        </a>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join us to manage your hearing health online.</p>
      </div>

      <!-- Social Logins -->
      <button class="social-auth-btn mb-3">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
        Sign up with Google
      </button>
      <button class="social-auth-btn mb-3">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        Sign up with Apple
      </button>

      <div class="auth-divider">or use email</div>

      <!-- Standard Form -->
      <form action="login.html" method="GET">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" class="form-control" placeholder="John Doe" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" class="form-control" placeholder="yourname@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="signup-password" class="form-control" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8">
            <button type="button" class="password-toggle-btn" data-target="signup-password" aria-label="Show password">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3">Sign Up</button>
      </form>

      <p class="text-center mt-4 mb-0 text-muted" style="font-size: 0.95rem;">
        Already have an account? <a href="login.html" class="text-decoration-none" style="color: var(--primary); font-weight: 600;">Log in</a>
      </p>

      <div class="text-center mt-3">
        <a href="index.html" class="text-decoration-none" style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">← Back to home</a>
      </div>
    </div>
  </div>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top">
    <svg width="24" height="24" viewBox="0 0 24 24">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
